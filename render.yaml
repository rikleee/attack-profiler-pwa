services:
  - type: web
    name: attack-profiler-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4.1-mini
      - key: CACHE_TTL_MS
        value: 1800000
      - key: SOURCE_TIMEOUT_MS
        value: 6500
