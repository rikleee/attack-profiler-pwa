<!doctype html>
<html lang="it"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta name="theme-color" content="#0f172a"><title>ATT&CK Profiler LLM</title>
<style>body{margin:0;background:#0f172a;color:#f8fafc;font-family:system-ui;padding:16px}.wrap{max-width:930px;margin:auto}.card{background:#111827;border:1px solid #334155;border-radius:16px;padding:16px;margin:14px 0}textarea,select{width:100%;box-sizing:border-box;background:#020617;color:white;border:1px solid #475569;border-radius:12px;padding:12px;font-size:16px}textarea{min-height:180px}button{width:100%;padding:14px;border:0;border-radius:12px;margin-top:10px;background:#38bdf8;color:#00111f;font-size:16px;font-weight:700}button:disabled{opacity:.6}.item{background:#020617;border:1px solid #334155;border-radius:12px;padding:12px;margin:9px 0}.muted{color:#94a3b8}.bar{height:8px;background:#22c55e;border-radius:99px;margin:8px 0}.hidden{display:none}.err{color:#fca5a5}.grid{display:grid;grid-template-columns:1fr;gap:10px}.pill{display:inline-block;background:#1e293b;border:1px solid #334155;border-radius:999px;padding:5px 9px;margin:4px;font-size:13px}@media(min-width:760px){.grid{grid-template-columns:1fr 1fr}}</style></head>
<body><div class="wrap"><h1>ATT&CK Profiler LLM</h1><p class="muted">Analisi MITRE ATT&CK con backend LLM, IOC extractor, detection e profili TTP compatibili.</p>
<div class="card"><label>Modalità output</label><select id="mode"><option value="soc">SOC / Incident Response</option><option value="ciso">CISO / Decisioni</option><option value="investigator">Investigatore / Evidenze</option></select><br><br><textarea id="input" placeholder="Descrivi l'attacco..."></textarea><button id="analyze" onclick="run()">Analizza con LLM</button><button onclick="demo()">Carica esempio</button><p id="status" class="muted"></p></div>
<div id="out" class="hidden"><div class="card"><h2>Sintesi</h2><div id="summary"></div></div><div class="card"><h2>IOC estratti</h2><div id="iocs"></div></div><div class="card"><h2>Tecniche MITRE rilevate</h2><div id="tech" class="grid"></div></div><div class="card"><h2>Profili TTP compatibili</h2><div id="groups" class="grid"></div></div><div class="card"><h2>Azioni consigliate</h2><div id="actions"></div></div><div class="card"><h2>Report testuale</h2><button onclick="copyReport()">Copia report</button><pre id="report" style="white-space:pre-wrap;color:#cbd5e1"></pre></div><div class="card"><b>Avvertenza</b><p id="warning" class="muted"></p></div></div></div>
<script>
const API='https://attack-profiler-pwa.onrender.com/api/analyze';let lastData=null;function pct(x){return Math.round((x||0)*100)}function esc(s){return String(s??'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]))}
async function run(){const text=input.value.trim();if(!text)return alert('Inserisci una descrizione');analyze.disabled=true;status.textContent='Analisi in corso...';out.classList.add('hidden');try{const r=await fetch(API,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({description:text,mode:mode.value})});if(!r.ok)throw new Error('Errore backend: '+r.status);const data=await r.json();lastData=data;render(data);status.textContent='Modalità: '+(data.mode||'backend')+' · Vista: '+(data.view_mode||mode.value)}catch(e){status.innerHTML='<span class="err">'+esc(e.message)+'</span>'}finally{analyze.disabled=false}}
function render(d){out.classList.remove('hidden');const s=d.executive_summary||{};summary.innerHTML=`<div class=item><b>Tecniche:</b> ${s.technique_count||0}<br><b>Tattiche:</b> ${(s.tactics||[]).map(esc).join(', ')||'-'}<br><b>Profilo principale:</b> ${esc(s.top_profile||'-')}<br><b>IOC:</b> ${s.ioc_count||0}<p class=muted>${esc(s.assessment||'')}</p></div>`;iocs.innerHTML=Object.keys(d.iocs||{}).length?Object.entries(d.iocs).map(([k,v])=>`<div class=item><b>${esc(k)}</b><br>${v.map(x=>`<span class=pill>${esc(x)}</span>`).join('')}</div>`).join(''):'<p>Nessun IOC esplicito rilevato.</p>';const techniques=d.detected_techniques||[];tech.innerHTML=techniques.length?techniques.map(t=>`<div class=item><b>${esc(t.id)} — ${esc(t.name)}</b><p class=muted>${esc(t.tactic)} · ${pct(t.confidence)}% · ${esc(t.source||'backend')}</p>${t.evidence?`<p><b>Evidenza:</b> ${esc(t.evidence)}</p>`:''}${t.reason?`<p><b>Motivo:</b> ${esc(t.reason)}</p>`:''}<p><b>Detection:</b><br>${(t.detections||[]).map(esc).join('<br>')}</p><p><b>Mitigazioni:</b> ${(t.mitigations||[]).map(esc).join(', ')}</p></div>`).join(''):'<p>Nessuna tecnica rilevata.</p>';const gs=d.probable_groups||[];groups.innerHTML=gs.length?gs.map(g=>`<div class=item><b>${esc(g.group)}</b><div class=bar style="width:${pct(g.score)}%"></div><p>Score: ${pct(g.score)}% · ${esc(g.confidence||'')}</p><p class=muted>${(g.matched_techniques||[]).map(esc).join(', ')}</p><p><b>Manca per attribuire:</b> ${(g.missing_for_attribution||[]).map(esc).join(', ')}</p><p class=muted>${esc(g.note||'')}</p></div>`).join(''):'<p>Nessun profilo compatibile.</p>';actions.innerHTML=(d.operational_actions||[]).map(a=>`<div class=item>${esc(a)}</div>`).join('');warning.textContent=d.warning||'';report.textContent=makeReport(d)}
function makeReport(d){return `ATT&CK PROFILER - REPORT\n\nSintesi: ${(d.executive_summary||{}).assessment||''}\nModalità: ${d.view_mode||''}\nMotore: ${d.mode||''}\n\nTecniche:\n${(d.detected_techniques||[]).map(t=>`- ${t.id} ${t.name} (${t.tactic}) conf. ${pct(t.confidence)}% evidenza: ${t.evidence||''}`).join('\n')}\n\nIOC:\n${Object.entries(d.iocs||{}).map(([k,v])=>`- ${k}: ${v.join(', ')}`).join('\n')}\n\nProfili compatibili:\n${(d.probable_groups||[]).map(g=>`- ${g.group}: ${pct(g.score)}% (${(g.matched_techniques||[]).join(', ')})`).join('\n')}\n\nAzioni:\n${(d.operational_actions||[]).map(a=>`- ${a}`).join('\n')}\n\nAvvertenza: ${d.warning||''}`}
function copyReport(){if(!lastData)return;navigator.clipboard.writeText(report.textContent);alert('Report copiato')}function demo(){input.value='Un dipendente riceve un’email apparentemente inviata dall’ufficio HR con allegato Excel Aggiornamento_stipendi.xlsx da hr-update@example.com. Dopo l’apertura abilita le macro. PowerShell scarica un payload da https://payroll-update.example.net/a.exe. Il malware crea una chiave Run nel registro per la persistenza e comunica in HTTPS con c2.example.net. Poi comprime documenti in ZIP e li carica su un servizio cloud esterno.';run()}
</script></body></html>
