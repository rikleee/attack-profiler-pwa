<!doctype html><html lang="it"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta name="theme-color" content="#0f172a"><title>ATT&CK Profiler</title><style>body{margin:0;background:#0f172a;color:#f8fafc;font-family:system-ui;padding:16px}.wrap{max-width:850px;margin:auto}.card{background:#111827;border:1px solid #334155;border-radius:16px;padding:16px;margin:14px 0}textarea{width:100%;min-height:150px;box-sizing:border-box;background:#020617;color:white;border:1px solid #475569;border-radius:12px;padding:12px;font-size:16px}button{width:100%;padding:14px;border:0;border-radius:12px;margin-top:10px;background:#38bdf8;color:#00111f;font-size:16px;font-weight:700}.item{background:#020617;border:1px solid #334155;border-radius:12px;padding:12px;margin:9px 0}.muted{color:#94a3b8}.bar{height:8px;background:#22c55e;border-radius:99px;margin:8px 0}.hidden{display:none}</style></head><body><div class="wrap"><h1>ATT&CK Profiler</h1><p class="muted">Descrivi un attacco: tecniche MITRE, gruppi compatibili e contromisure.</p><div class="card"><textarea id="input" placeholder="Esempio: Email di phishing con allegato Excel. L’utente abilita le macro, viene scaricato un payload, create chiavi di registro e il sistema comunica con un dominio C2."></textarea><button onclick="run()">Analizza</button><button onclick="demo()">Carica esempio</button></div><div id="out" class="hidden"><div class="card"><h2>Tecniche MITRE rilevate</h2><div id="tech"></div></div><div class="card"><h2>Gruppi compatibili</h2><div id="groups"></div></div><div class="card"><h2>Azioni consigliate</h2><div id="actions"></div></div><div class="card"><b>Avvertenza</b><p class="muted">L’attribuzione è probabilistica: servono IOC, malware, infrastruttura e contesto per confermarla.</p></div></div></div><script>const T={'T1566':['Phishing','Initial Access',['phishing','email','mail','allegato','link malevolo'],['Email filtering','Sandbox allegati','SPF/DKIM/DMARC']], 'T1204':['User Execution','Execution',['utente ha aperto','cliccato','eseguito','abilita le macro','abilitato le macro'],['EDR','Application control','Awareness']], 'T1059':['Command and Scripting Interpreter','Execution',['macro','powershell','script','cmd','shell'],['Bloccare macro non firmate','Limitare PowerShell']], 'T1547.001':['Registry Run Keys / Startup Folder','Persistence',['registro','registry','run key','startup','persistenza','runonce'],['Monitoraggio chiavi Run/RunOnce','Least privilege']], 'T1071':['Application Layer Protocol','Command and Control',['c2','dominio esterno','http','https','dns','beacon'],['DNS monitoring','Proxy filtering']], 'T1021.001':['Remote Desktop Protocol','Lateral Movement',['rdp','desktop remoto','accesso remoto'],['MFA su RDP','VPN obbligatoria']], 'T1562':['Impair Defenses','Defense Evasion',['disattivato antivirus','disabilitato edr','tampering'],['Tamper protection','Hardening EDR']], 'T1486':['Data Encrypted for Impact','Impact',['ransomware','cifratura','file cifrati','riscatto'],['Backup offline','Segmentazione rete']], 'T1560':['Archive Collected Data','Collection',['archivio','zip','rar','compressione','compressi'],['DLP','Monitoraggio compressione']], 'T1567':['Exfiltration Over Web Service','Exfiltration',['cloud storage','dropbox','google drive','mega','upload esterno'],['CASB','DLP']]};const G={'FIN7':['T1566','T1204','T1059','T1547.001','T1071'],'APT29':['T1566','T1204','T1059','T1071'],'TA505':['T1566','T1204','T1059','T1071','T1486'],'LockBit-like ransomware':['T1021.001','T1562','T1486'],'Generic Data Exfiltration Actor':['T1560','T1567','T1071']};function run(){let s=input.value.toLowerCase();if(!s)return alert('Inserisci una descrizione');let d=Object.entries(T).map(([id,x])=>{let m=x[2].filter(k=>s.includes(k));return m.length?{id,x,m,c:Math.min(.95,.55+.15*m.length)}:null}).filter(Boolean);out.classList.remove('hidden');tech.innerHTML=d.length?d.map(z=>`<div class=item><b>${z.id} — ${z.x[0]}</b><p class=muted>Tattica: ${z.x[1]} · Confidenza: ${Math.round(z.c*100)}%</p><p>Mitigazioni: ${z.x[3].join(', ')}</p></div>`).join(''):'Nessuna tecnica rilevata';let ids=new Set(d.map(z=>z.id));let gr=Object.entries(G).map(([n,a])=>{let m=a.filter(x=>ids.has(x));return m.length?{n,m,sc:m.length/ids.size}:null}).filter(Boolean).sort((a,b)=>b.sc-a.sc);groups.innerHTML=gr.length?gr.map(x=>`<div class=item><b>${x.n}</b><div class=bar style="width:${x.sc*100}%"></div>Score: ${Math.round(x.sc*100)}%<p class=muted>${x.m.join(', ')}</p></div>`).join(''):'Nessun gruppo compatibile';let a=['Preservare log e artefatti prima della bonifica.','Documentare la catena di custodia.'];if(ids.has('T1566'))a.push('Analizzare email, allegati, header e URL.');if(ids.has('T1071'))a.push('Analizzare DNS/HTTP/HTTPS e bloccare IOC confermati.');if(ids.has('T1547.001'))a.push('Verificare chiavi Run/RunOnce e startup.');if(ids.has('T1486'))a.push('Isolare host e verificare backup.');actions.innerHTML=a.map(x=>`<div class=item>${x}</div>`).join('')}function demo(){input.value='Email di phishing con allegato Excel. L’utente ha abilitato le macro, è stato scaricato un payload e il sistema comunica con un dominio C2 esterno. Sono state create chiavi di registro per la persistenza.';run()}</script></body></html>
